<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOQ 3.0 Life Orientation Wheel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --teal: #1A4D56;
            --mustard: #D9A520;
            --paper: #F2F0E6;
            --ink: #1F1A14;
            --bg: #E0DDCF;
            --border: rgba(26, 77, 86, 0.15);
            --shadow: rgba(26, 77, 86, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 1.25rem 1rem;
            color: var(--ink);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            background: var(--teal);
            padding: 1.25rem 2rem;
            border-radius: 4px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-family: 'JetBrains Mono', monospace;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .input-section {
            background: var(--paper);
            background-image:
                linear-gradient(rgba(26, 77, 86, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 77, 86, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 1.5rem 2rem;
            border-radius: 4px;
            border: 0.5px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .input-section h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.5rem;
            color: var(--teal);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .client-info {
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .info-group {
            margin-bottom: 0;
        }

        .info-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.3rem;
            opacity: 0.7;
        }

        .info-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--ink);
        }

        .cluster-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .cluster-column {
            display: flex;
            flex-direction: column;
        }

        .domain-input {
            margin-bottom: 0.6rem;
        }

        .domain-input label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        .domain-input input[type="number"] {
            width: 100%;
            padding: 0.45rem 0.65rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--ink);
        }

        .domain-input input[type="number"]:focus {
            outline: none;
            border-color: var(--mustard);
            box-shadow: 0 0 0 3px rgba(217, 165, 32, 0.1);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
            justify-content: flex-end;
        }

        .button-group button {
            flex: 0 0 auto;
            min-width: 160px;
        }

        button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-generate {
            background: var(--teal);
            color: var(--paper);
        }

        .btn-generate:hover {
            background: #234e58;
            transform: translateY(-1px);
        }

        .btn-clear {
            background: white;
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .visualization-section {
            background: var(--paper);
            background-image:
                linear-gradient(rgba(26, 77, 86, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 77, 86, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 2rem;
            border-radius: 4px;
            border: 0.5px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
        }

        #wheelCanvas {
            display: block;
            width: 100%;
            max-width: 700px;
            height: auto;
            margin: 0 auto;
        }

        .instructions {
            background: rgba(217, 165, 32, 0.08);
            border-left: 3px solid var(--mustard);
            padding: 1rem 1.25rem;
            margin-top: 2rem;
            border-radius: 4px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--ink);
            opacity: 0.7;
        }

        .download-btn {
            background: var(--mustard);
            color: var(--ink);
            visibility: hidden;
            width: 0;
            padding: 0;
            min-width: 0;
            margin: 0;
        }

        .download-btn:hover {
            background: #c89518;
            transform: translateY(-1px);
        }

        .download-btn.active {
            visibility: visible;
            width: auto;
            padding: 0.8rem;
            min-width: 160px;
            margin: 0;
        }

        @media (max-width: 600px) {
            .cluster-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 380px) {
            .cluster-grid {
                grid-template-columns: 1fr;
            }

            .client-info {
                grid-template-columns: 1fr;
            }

            .button-group {
                justify-content: stretch;
            }

            .button-group button {
                flex: 1;
                min-width: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Life Orientation Wheel 3.0</h1>
            <p class="subtitle">Scientific Assessment · Inner Cycle Lab</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <h2>Raw Domain Scores</h2>
                <p style="font-size: 0.75rem; margin-bottom: 1.5rem; opacity: 0.6;">Input score for each domain (Range: 1 - 10).</p>

                <div class="client-info">
                    <div class="info-group">
                        <label for="clientName">Client Name</label>
                        <input type="text" id="clientName" placeholder="Enter full name">
                    </div>
                    <div class="info-group">
                        <label for="assessmentDate">Assessment Date</label>
                        <input type="date" id="assessmentDate">
                    </div>
                </div>

                <div id="domainInputs"></div>

                <div class="button-group">
                    <button class="btn-generate" id="generateBtn" onclick="generateWheel()">Generate Wheel</button>
                    <button class="download-btn" id="downloadBtn" onclick="downloadWheel()">Download Image</button>
                    <button class="btn-clear" onclick="clearInputs()">Clear</button>
                </div>
            </div>

            <div class="visualization-section">
                <canvas id="wheelCanvas" width="2000" height="2260"></canvas>
                <div class="instructions">
                    <strong>Interpretation:</strong> Input scores (1–10) for each domain (rounded to 0.1). A score of 5.5
                    represents the exact midpoint of the scale.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Parse URL parameters and auto-fill domain scores on page load
        function loadScoresFromURL() {
            const params = new URLSearchParams(window.location.search);

            // Domain order: 1.Physical, 2.Financial, 3.Safety, 4.Living, 5.Relations, 6.Cultural, 7.Community, 8.Parenting, 9.Intimacy, 10.Mental, 11.Time, 12.Recreation, 13.Spirituality, 14.Career, 15.Growth, 16.Purpose, 17.Creativity
            const domainIds = [
                'physical', 'financial', 'safety', 'livingEnv', 'relations', 'cultural', 'community',
                'parenting', 'intimacy', 'mental', 'timeMgmt', 'recreation', 'spirituality',
                'career', 'growth', 'purpose', 'creativity'
            ];

            let hasData = false;
            domainIds.forEach((id, index) => {
                const paramKey = 'd' + (index + 1); // d1, d2, d3, ...
                const value = params.get(paramKey);
                if (value) {
                    const input = document.getElementById(id);
                    if (input) {
                        input.value = value;
                        hasData = true;
                    }
                }
            });

            // Auto-check gating checkboxes
            const g1 = params.get('g1');
            const g2 = params.get('g2');
            const g3 = params.get('g3');

            if (g1 === '1') document.getElementById('includeParenting').checked = true;
            if (g1 === '0') document.getElementById('includeParenting').checked = false;

            if (g2 === '1') document.getElementById('includeIntimacy').checked = true;
            if (g2 === '0') document.getElementById('includeIntimacy').checked = false;

            if (g3 === '1') document.getElementById('includeSpirituality').checked = true;
            if (g3 === '0') document.getElementById('includeSpirituality').checked = false;

            // Auto-generate wheel if data was loaded
            if (hasData && document.getElementById('generateBtn')) {
                setTimeout(() => {
                    document.getElementById('generateBtn').click();
                }, 500);
            }
        }

        // Call this when page loads
        window.addEventListener('load', loadScoresFromURL);
        const clusters = [
            { name: 'Foundation', color: '#1A4D56' },
            { name: 'Connection', color: '#3A8598' },
            { name: 'Expansion', color: '#D9A520' },
            { name: 'Internal Flow', color: '#916914' }
        ];

        const domains = [
            // Foundation Cluster (d1-d4)
            { id: 'physical', label: 'Physical\nWell-Being', color: '#1A4D56', cluster: 'Foundation' },
            { id: 'financial', label: 'Financial\nWell-Being', color: '#225B66', cluster: 'Foundation' },
            { id: 'safety', label: 'Safety &\nSecurity', color: '#2A6977', cluster: 'Foundation' },
            { id: 'livingEnv', label: 'Living\nEnvironment', color: '#327787', cluster: 'Foundation' },

            // Connection Cluster (d5-d9)
            { id: 'relations', label: 'Relations', color: '#3A8598', cluster: 'Connection' },
            { id: 'cultural', label: 'Cultural\nIdentity', color: '#5EBFD9', cluster: 'Connection' },
            { id: 'community', label: 'Community\nContribution', color: '#52AFC9', cluster: 'Connection' },
            { id: 'parenting', label: 'Parenting &\nCaregiving', color: '#4AA1B9', cluster: 'Connection', optional: true, checkboxId: 'includeParenting' },
            { id: 'intimacy', label: 'Sexuality &\nIntimacy', color: '#4293A8', cluster: 'Connection', optional: true, checkboxId: 'includeIntimacy' },

            // Internal Flow Cluster (d10-d13)
            { id: 'mental', label: 'Mental\nWell-Being', color: '#9D7316', cluster: 'Internal Flow' },
            { id: 'timeMgmt', label: 'Time\nManagement', color: '#916914', cluster: 'Internal Flow' },
            { id: 'recreation', label: 'Recreation &\nLeisure', color: '#855F12', cluster: 'Internal Flow' },
            { id: 'spirituality', label: 'Spirituality', color: '#795510', cluster: 'Internal Flow', optional: true, checkboxId: 'includeSpirituality' },

            // Expansion Cluster (d14-d17)
            { id: 'career', label: 'Career &\nAchievement', color: '#CD9B1E', cluster: 'Expansion' },
            { id: 'growth', label: 'Personal\nGrowth', color: '#C1911C', cluster: 'Expansion' },
            { id: 'purpose', label: 'Meaning &\nPurpose', color: '#B5871A', cluster: 'Expansion' },
            { id: 'creativity', label: 'Creativity &\nExpression', color: '#A97D18', cluster: 'Expansion' }
        ];

        // Create inputs dynamically grouped by cluster — one column per cluster
        const inputContainer = document.getElementById('domainInputs');
        inputContainer.classList.add('cluster-grid');
        clusters.forEach(c => {
            const col = document.createElement('div');
            col.className = 'cluster-column';

            const clusterHeader = document.createElement('h3');
            clusterHeader.style.cssText = `color: ${c.color}; font-size: 0.85rem; margin: 0 0 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem;`;
            clusterHeader.innerText = c.name;
            col.appendChild(clusterHeader);

            domains.filter(d => d.cluster === c.name).forEach((d, i) => {
                const div = document.createElement('div');
                div.className = 'domain-input';
                if (d.optional) {
                    div.innerHTML = `
                        <label style="display:flex; align-items:center; gap:0.4rem; cursor:pointer; margin-bottom:0.25rem;">
                            <input type="checkbox" id="${d.checkboxId}" checked style="width:auto; accent-color: var(--mustard); cursor:pointer; margin:0;">
                            <span style="flex:1; min-width:0;">${d.label.replace('\n', ' ')} (1-10)</span>
                        </label>
                        <input type="number" id="${d.id}" min="1" max="10" step="0.1" placeholder="Score">
                    `;
                } else {
                    div.innerHTML = `<label>${d.label.replace('\n', ' ')} (1-10)</label>
                                     <input type="number" id="${d.id}" min="1" max="10" step="0.1" placeholder="Score">`;
                }
                col.appendChild(div);
            });

            inputContainer.appendChild(col);

            // Wire up optional-domain checkboxes to dim/disable their number inputs
            domains.filter(d => d.cluster === c.name && d.optional).forEach(d => {
                const cb = document.getElementById(d.checkboxId);
                const numInput = document.getElementById(d.id);
                const updateState = () => {
                    numInput.disabled = !cb.checked;
                    numInput.style.opacity = cb.checked ? '1' : '0.4';
                };
                cb.addEventListener('change', updateState);
                updateState();
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('input').forEach(input => {
                const saved = localStorage.getItem('loq3_' + input.id);
                if (input.type === 'checkbox') {
                    if (saved !== null) {
                        input.checked = saved === 'true';
                        input.dispatchEvent(new Event('change'));
                    }
                    input.addEventListener('change', (e) => localStorage.setItem('loq3_' + e.target.id, e.target.checked));
                } else {
                    if (saved !== null) input.value = saved;
                    input.addEventListener('input', (e) => localStorage.setItem('loq3_' + e.target.id, e.target.value));
                }
            });
            if (!document.getElementById('assessmentDate').value) document.getElementById('assessmentDate').valueAsDate = new Date();
        });

        function generateWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

            const centerX = canvas.width / 2;
            const headerHeight = 280;
            const centerY = (canvas.height + headerHeight) / 2 - 50;
            const maxRadius = 650;
            const scale = 3.33;

            // --- FILTER ACTIVE DOMAINS based on optional-domain checkboxes ---
            const activeDomains = domains.filter(d => {
                if (!d.optional) return true;
                const cb = document.getElementById(d.checkboxId);
                return cb ? cb.checked : true;
            });

            // --- CALCULATE SCORES ---
            const clusterScores = clusters.map(c => {
                const clusterDomains = activeDomains.filter(d => d.cluster === c.name);
                const scores = clusterDomains.map(d => {
                    const raw = parseFloat(document.getElementById(d.id).value);
                    if (isNaN(raw)) return null;
                    return Math.max(1, Math.min(10, raw));
                }).filter(s => s !== null);
                if (scores.length === 0) return null;
                const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                return Math.round(avg * 10) / 10;
            });

            const scores1to10 = activeDomains.map(d => {
                const raw = parseFloat(document.getElementById(d.id).value);
                if (isNaN(raw)) return null;
                return Math.round(Math.max(1, Math.min(10, raw)) * 10) / 10;
            });

            const percentages = scores1to10.map(s => (s === null) ? 0 : ((s - 1) / 9) * 100);
            if (scores1to10.every(s => s === null)) { alert('Please enter scores'); return; }

            ctx.fillStyle = '#F2F0E6'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1A4D56'; ctx.fillRect(0, 0, canvas.width, headerHeight);
            ctx.textAlign = 'center'; ctx.fillStyle = '#FFFFFF'; ctx.font = '600 85px "DM Sans"';
            ctx.fillText('Life Orientation Wheel 3.0', centerX, 140);

            const clientName = document.getElementById('clientName').value;
            const dateVal = document.getElementById('assessmentDate').value;
            let subText = (clientName && dateVal) ? `${clientName} | ${dateVal}` : (clientName || dateVal || 'LOQ 3.0 · SCIENTIFIC ASSESSMENT');
            ctx.fillStyle = '#D9A520'; ctx.font = '500 40px "Inter"'; ctx.fillText(subText, centerX, 225);

            // Draw rings
            ctx.strokeStyle = 'rgba(26,77,86,0.13)'; ctx.lineWidth = 1.2 * scale;
            for (let i = 1; i <= 4; i++) {
                ctx.beginPath(); ctx.arc(centerX, centerY, (maxRadius / 4) * i, 0, Math.PI * 2); ctx.stroke();
            }

            // --- DRAW CLUSTER BACKGROUND SHADING ---
            let currentAngle = -Math.PI / 2;
            clusters.forEach(c => {
                const clusterDomains = activeDomains.filter(d => d.cluster === c.name);
                if (clusterDomains.length === 0) return;
                const clusterAngle = (Math.PI * 2 / activeDomains.length) * clusterDomains.length;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, maxRadius, currentAngle, currentAngle + clusterAngle);
                ctx.closePath();

                // Create a very subtle radial gradient for the background
                const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(1, c.color);

                ctx.globalAlpha = 0.06; // Very transparent
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.restore();

                currentAngle += clusterAngle;
            });

            // Draw data
            ctx.beginPath();
            activeDomains.forEach((d, i) => {
                const angle = (Math.PI * 2 / activeDomains.length) * i - Math.PI / 2;
                const radius = maxRadius * (percentages[i] / 100);
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(26, 77, 86, 0.08)'; ctx.fill();
            ctx.strokeStyle = '#1A4D56'; ctx.lineWidth = 4 * scale; ctx.stroke();

            // Labels
            activeDomains.forEach((d, i) => {
                const angle = (Math.PI * 2 / activeDomains.length) * i - Math.PI / 2;
                const x = centerX + Math.cos(angle) * (maxRadius + 140);
                const y = centerY + Math.sin(angle) * (maxRadius + 140);
                ctx.fillStyle = '#1F1A14'; ctx.font = '600 32px DM Sans'; ctx.globalAlpha = 0.7;
                d.label.split('\n').forEach((l, li) => ctx.fillText(l, x, y + (li - 0.5) * 45));
                ctx.globalAlpha = 1; ctx.font = 'bold 38px DM Sans'; ctx.fillStyle = d.color;
                const display = (scores1to10[i] !== null) ? scores1to10[i].toFixed(1) : '0.0';
                ctx.fillText(display + '/10', x, y + 80);
            });

            // Center Score
            const valid = scores1to10.filter(s => s !== null);
            const avg = valid.length > 0 ? (valid.reduce((a, b) => a + b, 0) / valid.length) : 0;
            const finalAvg = (Math.round(avg * 10) / 10).toFixed(1);
            ctx.beginPath(); ctx.arc(centerX, centerY, 110, 0, Math.PI * 2); ctx.fillStyle = '#F2F0E6'; ctx.fill();
            ctx.strokeStyle = '#D9A520'; ctx.lineWidth = 8 * scale; ctx.stroke();
            ctx.fillStyle = '#1A4D56'; ctx.font = 'bold 75px DM Sans'; ctx.fillText(finalAvg, centerX, centerY + 15);
            ctx.font = '28px JetBrains Mono'; ctx.globalAlpha = 0.5; ctx.fillText('SCORE', centerX, centerY + 60);

            // Cluster Summary Boxes
            const boxWidth = 380; const boxHeight = 120; const pad = 60;
            const boxPos = [
                { x: canvas.width - boxWidth - pad, y: headerHeight + pad },         // 0: Foundation -> UR
                { x: canvas.width - boxWidth - pad, y: canvas.height - boxHeight - pad - 100 }, // 1: Connection -> LR
                { x: pad, y: canvas.height - boxHeight - pad - 100 },                // 2: Expansion -> LL
                { x: pad, y: headerHeight + pad }                                   // 3: Internal Flow -> UL
            ];

            clusters.forEach((c, i) => {
                const pos = boxPos[i]; const score = clusterScores[i];
                if (score === null) return;
                ctx.fillStyle = '#FFFFFF'; ctx.shadowBlur = 15; ctx.fillRect(pos.x, pos.y, boxWidth, boxHeight); ctx.shadowBlur = 0;
                ctx.fillStyle = c.color; ctx.fillRect(pos.x, pos.y, 10, boxHeight);
                ctx.textAlign = 'left'; ctx.fillStyle = '#1F1A14'; ctx.font = '600 24px JetBrains Mono'; ctx.globalAlpha = 0.5;
                ctx.fillText(c.name.toUpperCase(), pos.x + 30, pos.y + 45);
                ctx.globalAlpha = 1.0; ctx.font = 'bold 45px DM Sans'; ctx.fillStyle = c.color;
                ctx.fillText(score.toFixed(1) + '/10.0', pos.x + 30, pos.y + 90);
            });

            document.getElementById('downloadBtn').classList.add('active');
        }

        function clearInputs() {
            document.querySelectorAll('input').forEach(i => {
                if (i.type === 'checkbox') {
                    i.checked = true;
                    i.dispatchEvent(new Event('change'));
                } else {
                    i.value = '';
                }
                localStorage.removeItem('loq3_' + i.id);
            });
            document.getElementById('assessmentDate').valueAsDate = new Date();
            document.getElementById('downloadBtn').classList.remove('active');
        }

        function downloadWheel() {
            const c = document.getElementById('wheelCanvas');
            const l = document.createElement('a');
            l.download = `LOQ3_${document.getElementById('clientName').value || 'Assessment'}.png`;
            l.href = c.toDataURL(); l.click();
        }
    </script>
</body>

</html>
