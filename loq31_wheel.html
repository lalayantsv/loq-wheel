<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Map · Կյանքի Քարտեզ — LOQ 3.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Armenian:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --teal: #324D47;
            --mustard: #C19A47;
            --paper: #F2F0E6;
            --ink: #1F1A14;
            --bg: #E0DDCF;
            --border: rgba(50, 77, 71, 0.15);
            --shadow: rgba(50, 77, 71, 0.08);
            --foundation-primary: #324D47;
            --connection-primary: #B8755E;
            --internal-flow-primary: #6B8E5F;
            --expansion-primary: #C19A47;
        }

        body {
            font-family: 'Inter', 'Noto Sans Armenian', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 1.25rem 1rem;
            color: var(--ink);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            position: relative;
            text-align: center;
            margin-bottom: 1.5rem;
            background: var(--teal);
            padding: 1.25rem 2rem;
            border-radius: 4px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-family: 'JetBrains Mono', monospace;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .input-section {
            background: var(--paper);
            background-image:
                linear-gradient(rgba(50, 77, 71, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(50, 77, 71, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 1.5rem 2rem;
            border-radius: 4px;
            border: 0.5px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .input-section h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.5rem;
            color: var(--teal);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .client-info {
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .info-group {
            margin-bottom: 0;
        }

        .info-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.3rem;
            opacity: 0.7;
        }

        .info-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--ink);
        }

        .cluster-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .cluster-column {
            display: flex;
            flex-direction: column;
        }

        .domain-input {
            margin-bottom: 0.6rem;
        }

        .domain-input label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        .domain-input input[type="number"] {
            width: 100%;
            padding: 0.45rem 0.65rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            background: white;
            color: var(--ink);
        }

        .domain-input input[type="number"]:focus {
            outline: none;
            border-color: var(--mustard);
            box-shadow: 0 0 0 3px rgba(193, 154, 71, 0.1);
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
            justify-content: flex-end;
        }

        .button-group button {
            flex: 0 0 auto;
            min-width: 160px;
        }

        button {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-generate {
            background: var(--teal);
            color: var(--paper);
        }

        .btn-generate:hover {
            background: #3d5a53;
            transform: translateY(-1px);
        }

        .btn-clear {
            background: white;
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .visualization-section {
            background: var(--paper);
            background-image:
                linear-gradient(rgba(50, 77, 71, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(50, 77, 71, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 2rem;
            border-radius: 4px;
            border: 0.5px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
        }

        #wheelCanvas {
            display: block;
            width: 100%;
            max-width: 700px;
            height: auto;
            margin: 0 auto;
        }

        .instructions {
            background: rgba(193, 154, 71, 0.08);
            border-left: 3px solid var(--mustard);
            padding: 1rem 1.25rem;
            margin-top: 2rem;
            border-radius: 4px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--ink);
            opacity: 0.7;
        }

        .download-btn {
            background: var(--mustard);
            color: var(--ink);
            visibility: hidden;
            width: 0;
            padding: 0;
            min-width: 0;
            margin: 0;
        }

        .download-btn:hover {
            background: #af8a3f;
            transform: translateY(-1px);
        }

        .download-btn.active {
            visibility: visible;
            width: auto;
            padding: 0.8rem;
            min-width: 160px;
            margin: 0;
        }

        @media (max-width: 600px) {
            .cluster-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 380px) {
            .cluster-grid {
                grid-template-columns: 1fr;
            }

            .client-info {
                grid-template-columns: 1fr;
            }

            .button-group {
                justify-content: stretch;
            }

            .button-group button {
                flex: 1;
                min-width: 0;
            }
        }
    </style>
</head>

        // Local storage auto-fill removed so page opens completely blank

        // Helper function to lighten a color
        function lightenColor(hex, amount) {
            const rgb = parseInt(hex.slice(1), 16);
            const r = Math.min(255, (rgb >> 16) + Math.round(255 * amount));
            const g = Math.min(255, ((rgb >> 8) & 0xFF) + Math.round(255 * amount));
            const b = Math.min(255, (rgb & 0xFF) + Math.round(255 * amount));
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function generateWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

            const centerX = canvas.width / 2;
            const headerHeight = 280;
            const centerY = (canvas.height + headerHeight) / 2 - 50;
            const maxRadius = 650;
            const scale = 3.33;

            // --- FILTER ACTIVE DOMAINS based on optional-domain checkboxes ---
            const activeDomains = domains.filter(d => {
                if (!d.optional) return true;
                const cb = document.getElementById(d.checkboxId);
                return cb ? cb.checked : true;
            });

            // --- CALCULATE SCORES ---
            const clusterScores = clusters.map(c => {
                const clusterDomains = activeDomains.filter(d => d.cluster === c.name);
                if (clusterDomains.length === 0) return null;

                const scores = clusterDomains.map(d => {
                    const input = document.getElementById(d.id);
                    const raw = input ? parseFloat(input.value) : NaN;
                    if (isNaN(raw) || raw === '') return null;
                    return Math.max(1, Math.min(10, raw));
                }).filter(s => s !== null);

                if (scores.length === 0) return null;
                const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                return Math.round(avg * 10) / 10;
            });

            const scores1to10 = activeDomains.map(d => {
                const raw = parseFloat(document.getElementById(d.id).value);
                if (isNaN(raw)) return null;
                return Math.round(Math.max(1, Math.min(10, raw)) * 10) / 10;
            });

            const percentages = scores1to10.map(s => (s === null) ? 0 : (s / 10) * 100);
            if (scores1to10.every(s => s === null)) { alert(T.alertNoScores); return; }

            // Draw background with grid pattern
            ctx.fillStyle = '#F2F0E6'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add grid pattern to background
            ctx.strokeStyle = 'rgba(50,77,71,0.04)'; ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 20) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 20) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            ctx.fillStyle = '#324D47'; ctx.fillRect(0, 0, canvas.width, headerHeight);
            ctx.textAlign = 'center'; ctx.fillStyle = '#FFFFFF'; ctx.font = '600 85px ' + FONT_STACK;
            ctx.fillText(LOQ_CONFIG.title[LANG], centerX, 140);

            const clientName = document.getElementById('clientName').value;
            const dateVal = document.getElementById('assessmentDate').value;
            let subText = (clientName && dateVal) ? `${clientName} | ${dateVal}` : (clientName || dateVal || 'LOQ ' + LOQ_CONFIG.version + ' · ' + LOQ_CONFIG.subtitle[LANG].toUpperCase());
            ctx.fillStyle = '#C19A47'; ctx.font = '500 40px "Inter", "Noto Sans Armenian", sans-serif'; ctx.fillText(subText, centerX, 225);

            // Draw rings for scores 1-10 (dotted and transparent)
            ctx.strokeStyle = 'rgba(50,77,71,0.08)'; ctx.lineWidth = 1.2 * scale;
            ctx.setLineDash([6, 4]);
            for (let i = 1; i <= 10; i++) {
                ctx.beginPath(); ctx.arc(centerX, centerY, (maxRadius / 10) * i, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.setLineDash([]);

            // --- DRAW RADAR/SPIDER CHART ---
            const domainAngle = Math.PI * 2 / activeDomains.length;
            const labelRotationOffset = Math.PI / activeDomains.length; // Rotate by one domain unit

            // Collect points for the polygon
            const points = activeDomains.map((d, i) => {
                const angle = (domainAngle * i) - Math.PI / 2 + labelRotationOffset;
                const radius = maxRadius * (percentages[i] / 100);
                return {
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    angle: angle
                };
            });

            // Draw filled polygon with domain color gradients (ultra-smooth angular blend)
            ctx.save();
            ctx.globalAlpha = 0.55;

            // Define the polygon path
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach((p, i) => {
                if (i > 0) ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();

            // Clip all drawing to the polygon
            ctx.clip();

            // 1. Fill with a heavily blurred angular (conic) gradient
            const startAngle = points[0].angle;
            const conicGradient = ctx.createConicGradient(startAngle, centerX, centerY);

            points.forEach((p, i) => {
                conicGradient.addColorStop(i / points.length, activeDomains[i].color);
            });
            conicGradient.addColorStop(1, activeDomains[0].color); // close the loop

            ctx.filter = 'blur(100px)'; // Heavy blur to remove linear gradient creases
            ctx.fillStyle = conicGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Add the center lightness fade
            ctx.filter = 'none'; // Turn off blur for the radial fade
            const centerFade = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius * 0.6);
            centerFade.addColorStop(0, '#F2F0E6');      // Center: light
            centerFade.addColorStop(1, 'rgba(242, 240, 230, 0)');  // Fade out

            ctx.fillStyle = centerFade;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.restore(); // Resets alpha, clip, filter
            ctx.globalAlpha = 1.0;

            // Draw polygon outline
            ctx.strokeStyle = '#324D47';
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach((p, i) => {
                ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.stroke();

            // Draw radial guide lines
            ctx.strokeStyle = 'rgba(50,77,71,0.15)';
            ctx.lineWidth = 1.5 * scale;
            ctx.setLineDash([6, 4]);
            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            // Draw points/nodes at each domain
            points.forEach((p, i) => {
                const domainColor = activeDomains[i].color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4.5 * scale, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
                ctx.strokeStyle = domainColor;
                ctx.lineWidth = 2 * scale;
                ctx.stroke();
            });


            // Labels positioned outside the outermost circle (horizontal text).
            // One shared font size for ALL labels: shrink until the widest line of
            // any label fits, so long Armenian names don't force uneven sizing.
            let labelSize = 32;
            ctx.font = '600 ' + labelSize + 'px ' + FONT_STACK;
            const widestLabelLine = () => Math.max(...activeDomains.flatMap(
                d => d.label.split('\n').map(l => ctx.measureText(l).width)));
            while (labelSize > 22 && widestLabelLine() > 280) {
                labelSize -= 1;
                ctx.font = '600 ' + labelSize + 'px ' + FONT_STACK;
            }
            activeDomains.forEach((d, i) => {
                const angle = (Math.PI * 2 / activeDomains.length) * i - Math.PI / 2 + labelRotationOffset;
                const x = centerX + Math.cos(angle) * (maxRadius + 140);
                const y = centerY + Math.sin(angle) * (maxRadius + 140);
                ctx.font = '600 ' + labelSize + 'px ' + FONT_STACK;
                ctx.fillStyle = '#1F1A14'; ctx.globalAlpha = 0.7;
                d.label.split('\n').forEach((l, li) => ctx.fillText(l, x, y + (li - 0.5) * 45));
                ctx.globalAlpha = 1; ctx.font = 'bold 38px ' + FONT_STACK; ctx.fillStyle = d.color;
                const display = (scores1to10[i] !== null) ? scores1to10[i].toFixed(1) : '0.0';
                ctx.fillText(display + '/10', x, y + 80);
            });

            // Center Score
            const valid = scores1to10.filter(s => s !== null);
            const avg = valid.length > 0 ? (valid.reduce((a, b) => a + b, 0) / valid.length) : 0;
            const finalAvg = (Math.round(avg * 10) / 10).toFixed(1);
            ctx.beginPath(); ctx.arc(centerX, centerY, 95, 0, Math.PI * 2); ctx.fillStyle = '#F2F0E6'; ctx.fill();
            ctx.strokeStyle = '#C19A47'; ctx.lineWidth = 7 * scale; ctx.stroke();
            ctx.fillStyle = '#324D47'; ctx.font = 'bold 65px ' + FONT_STACK; ctx.fillText(finalAvg, centerX, centerY + 13);
            ctx.font = '24px "JetBrains Mono", "Noto Sans Armenian", monospace'; ctx.globalAlpha = 0.5; ctx.fillText(T.score, centerX, centerY + 52);

            // Cluster Summary Boxes
            const boxWidth = 380; const boxHeight = 120; const pad = 60;
            const boxPos = [
                { x: canvas.width - boxWidth - pad, y: headerHeight + pad },         // 0: Foundation -> UR
                { x: canvas.width - boxWidth - pad, y: canvas.height - boxHeight - pad - 100 }, // 1: Connection -> LR
                { x: pad, y: canvas.height - boxHeight - pad - 100 },                // 2: Internal Flow -> LL (swapped to UL actually, see note below)
                { x: pad, y: headerHeight + pad }                                   // 3: Expansion -> UL (swapped to LL actually)
            ];
            // Correcting for user's request: Internal Flow bottom-left, Expansion top-left
            boxPos[2] = { x: pad, y: canvas.height - boxHeight - pad - 100 };       // Internal Flow -> LL
            boxPos[3] = { x: pad, y: headerHeight + pad };                           // Expansion -> UL

            clusters.forEach((c, i) => {
                const pos = boxPos[i]; const score = clusterScores[i];
                if (score === null) return;
                ctx.fillStyle = '#FFFFFF'; ctx.shadowBlur = 15; ctx.fillRect(pos.x, pos.y, boxWidth, boxHeight); ctx.shadowBlur = 0;
                ctx.fillStyle = c.color; ctx.fillRect(pos.x, pos.y, 10, boxHeight);
                ctx.textAlign = 'left'; ctx.fillStyle = '#1F1A14'; ctx.font = '600 24px "JetBrains Mono", "Noto Sans Armenian", monospace'; ctx.globalAlpha = 0.5;
                ctx.fillText(c.display.toUpperCase(), pos.x + 30, pos.y + 45);
                ctx.globalAlpha = 1.0; ctx.font = 'bold 45px ' + FONT_STACK; ctx.fillStyle = c.color;
                ctx.fillText(score.toFixed(1) + '/10.0', pos.x + 30, pos.y + 90);
            });

            // Draw Logo v3 lockup in bottom-left corner (official artwork)
            if (logoImg.complete && logoImg.naturalWidth) {
                const logoW = 460;
                const logoH = logoW * logoImg.naturalHeight / logoImg.naturalWidth;
                ctx.drawImage(logoImg, pad, canvas.height - pad - logoH, logoW, logoH);
            }

            document.getElementById('downloadBtn').classList.add('active');
        }

        function fillDemoValues() {
            // Fill in random values between 1 and 10 for all domain inputs
            domains.forEach(d => {
                const input = document.getElementById(d.id);
                if (input) {
                    const randomValue = (Math.random() * 9 + 1).toFixed(1); // Random between 1.0 and 10.0
                    input.value = randomValue;
                }
            });

            // Randomly toggle the optional (gated) domain checkboxes
            domains.filter(d => d.optional).forEach(d => {
                const checkbox = document.getElementById(d.checkboxId);
                if (checkbox) {
                    const randomBool = Math.random() > 0.5;
                    checkbox.checked = randomBool;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });

            // Set client name and date
            document.getElementById('assessmentDate').valueAsDate = new Date();

            // Auto-generate wheel after brief delay
            setTimeout(() => {
                generateWheel();
            }, 300);
        }

        function clearInputs() {
            document.querySelectorAll('input').forEach(i => {
                if (i.type === 'checkbox') {
                    i.checked = true;
                    i.dispatchEvent(new Event('change'));
                } else {
                    i.value = '';
                }
            });
            document.getElementById('downloadBtn').classList.remove('active');
        }

        function downloadWheel() {
            const c = document.getElementById('wheelCanvas');
            const l = document.createElement('a');
            const name = document.getElementById('clientName').value || 'Assessment';
            const rawDate = document.getElementById('assessmentDate').value;
            let dateStr = '';
            if (rawDate) {
                const d = new Date(rawDate + 'T00:00:00'); // T00:00:00 prevents timezone shift
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                dateStr = '_' + String(d.getDate()).padStart(2, '0') + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
            }
            l.download = `${T.fileBase}_${name}${dateStr}.png`;
            l.href = c.toDataURL(); l.click();
        }
    </script>
</body>
